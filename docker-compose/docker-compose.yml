services:
  web:
    build: ./flask-app
    ports:
      - "5000:5000"
    environment:
      - APP_SECRET=supersecret
      - DB_HOST=db
      - DB_NAME=flask_db
      - DB_USER=flaskuser
      - DB_PASS=flaskpass
    depends_on:
      - db

  db:
    image: postgres:14
    environment:
      - POSTGRES_USER=flaskuser
      - POSTGRES_PASSWORD=flaskpass
      - POSTGRES_DB=flask_db
    volumes:
      - db_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  db_data:
      